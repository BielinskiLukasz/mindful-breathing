<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Minutnik oddechowy</title>
  <style>
    :root{
      --bg: #111;
      --card: #171717;
      --accent: #9aa0a6;
      --accentSoft: rgba(154,160,166,0.18);
      --text: #fff;
    }

    body {
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      transition: background 220ms ease;
    }

    .container {
      text-align: center;
      padding: 24px;
      width: min(520px, 92vw);
      background: var(--card);
      border-radius: 18px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.35);
      border: 2px solid var(--accentSoft);
      transition: border-color 220ms ease;
    }

    .cycle {
      font-size: 20px;
      margin-bottom: 10px;
      color: #c7c7c7;
      opacity: 0.9;
    }

    .phase {
      font-size: 46px;
      margin-bottom: 10px;
      color: var(--accent);
      transition: color 220ms ease;
    }

    /* ====== PROGRESS RING ====== */
    .ringWrap {
      position: relative;
      width: 240px;
      height: 240px;
      margin: 8px auto 18px auto;
      display: grid;
      place-items: center;
    }

    .ringSvg {
      width: 240px;
      height: 240px;
      transform: rotate(-90deg); /* start at 12 o'clock */
      overflow: visible;
    }

    .ringBg {
      stroke: rgba(255,255,255,0.12);
    }

    .ringProgress {
      stroke: var(--accent);
      filter: drop-shadow(0 0 10px rgba(0,0,0,0.35));
      transition: stroke-dashoffset 300ms linear, stroke 220ms ease;
      stroke-linecap: round;
    }

    .ringContent {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      pointer-events: none;
    }

    .time {
      font-size: 78px;
      font-weight: 800;
      line-height: 1;
      color: var(--accent);
      transition: color 220ms ease;
    }

    .subHint {
      margin-top: 8px;
      font-size: 12px;
      color: rgba(255,255,255,0.55);
    }

    /* ====== CONTROLS ====== */
    .controls {
      display: flex;
      gap: 12px;
      justify-content: center;
      align-items: center;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    button {
      font-size: 18px;
      padding: 12px 18px;
      border: 0;
      border-radius: 12px;
      cursor: pointer;
      background: #2b2b2b;
      color: #fff;
      transition: transform 0.05s ease, background 0.2s ease;
      min-width: 120px;
    }

    button:hover { background: #3a3a3a; }
    button:active { transform: scale(0.98); }

    .resetBtn {
      background: #3a1f1f;
    }
    .resetBtn:hover {
      background: #4a2a2a;
    }

    .status {
      margin-top: 14px;
      font-size: 14px;
      color: #9aa0a6;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      opacity: 0.95;
    }

    .runningDot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #f44336; /* red when stopped */
      transition: background 220ms ease;
    }

    .running .runningDot {
      background: #4caf50; /* green when running */
    }
  </style>
</head>

<body>
  <div class="container" id="app">
    <div class="cycle" id="cycle">Powtórzenie: 1</div>
    <div class="phase" id="phase">Przerwa</div>

    <!-- Progress ring + time inside -->
    <div class="ringWrap">
      <svg class="ringSvg" viewBox="0 0 220 220" aria-hidden="true">
        <!-- tło ringu -->
        <circle
          class="ringBg"
          cx="110" cy="110" r="92"
          fill="transparent"
          stroke-width="14"
        />
        <!-- progres ringu -->
        <circle
          id="ringProgress"
          class="ringProgress"
          cx="110" cy="110" r="92"
          fill="transparent"
          stroke-width="14"
        />
      </svg>

      <div class="ringContent">
        <div>
          <div class="time" id="time">2</div>
          <div class="subHint">sekundy</div>
        </div>
      </div>
    </div>

    <div class="controls">
      <button id="toggleBtn">Start</button>
      <button id="resetBtn" class="resetBtn">Reset</button>
    </div>

    <div class="status">
      <span class="runningDot"></span>
      <span id="statusText">Zatrzymany</span>
    </div>
  </div>

  <script>
    // Konfiguracja faz
    const phases = [
      { name: "Przerwa", duration: 2, theme: { bg: "#101010", accent: "#9aa0a6" } },
      { name: "Wdech",   duration: 4, theme: { bg: "#07160a", accent: "#34d399" } }, // zielony
      { name: "Przerwa", duration: 2, theme: { bg: "#101010", accent: "#9aa0a6" } },
      { name: "Wydech",  duration: 8, theme: { bg: "#06121d", accent: "#60a5fa" } }  // niebieski
    ];

    let currentPhaseIndex = 0;
    let cycleCount = 1;

    // Zamiast timeLeft liczymy "elapsed" w ramach fazy.
    // Dzięki temu łatwo zsynchronizować progress ring.
    let elapsed = 0;

    let timerId = null;
    let isRunning = false;

    // DOM
    const appEl = document.getElementById("app");
    const phaseEl = document.getElementById("phase");
    const timeEl = document.getElementById("time");
    const cycleEl = document.getElementById("cycle");
    const toggleBtn = document.getElementById("toggleBtn");
    const resetBtn = document.getElementById("resetBtn");
    const statusText = document.getElementById("statusText");
    const ringProgressEl = document.getElementById("ringProgress");

    // Ring geometry
    const RADIUS = 92;
    const CIRC = 2 * Math.PI * RADIUS;

    // Init ring stroke values
    ringProgressEl.style.strokeDasharray = `${CIRC}`;
    ringProgressEl.style.strokeDashoffset = `${CIRC}`; // 0% na starcie (pusty)

    function hexToRgba(hex, alpha) {
      const h = hex.replace("#", "");
      const full = h.length === 3 ? h.split("").map(c => c + c).join("") : h;
      const r = parseInt(full.slice(0, 2), 16);
      const g = parseInt(full.slice(2, 4), 16);
      const b = parseInt(full.slice(4, 6), 16);
      return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

    function applyThemeForCurrentPhase() {
      const { bg, accent } = phases[currentPhaseIndex].theme;
      document.body.style.setProperty("--bg", bg);
      document.documentElement.style.setProperty("--accent", accent);
      document.documentElement.style.setProperty("--accentSoft", hexToRgba(accent, 0.22));
      appEl.style.borderColor = hexToRgba(accent, 0.22);
    }

    function updateRing() {
      const duration = phases[currentPhaseIndex].duration;

      // progress: 0..1, ile sekund fazy już minęło
      const progress = Math.min(elapsed / duration, 1);

      // dashoffset: CIRC (pusto) -> 0 (pełne)
      const offset = CIRC * (1 - progress);
      ringProgressEl.style.strokeDashoffset = `${offset}`;
    }

    function updateDisplay() {
      const duration = phases[currentPhaseIndex].duration;
      const timeLeft = duration - elapsed; // pokazujemy: duration, duration-1, ... 1

      phaseEl.textContent = phases[currentPhaseIndex].name;
      timeEl.textContent = timeLeft;
      cycleEl.textContent = "Powtórzenie: " + cycleCount;

      applyThemeForCurrentPhase();
      updateRing();
    }

    function updateStatusUI() {
      if (isRunning) {
        toggleBtn.textContent = "Stop";
        statusText.textContent = "W trakcie";
        appEl.classList.add("running");
      } else {
        toggleBtn.textContent = "Start";
        statusText.textContent = "Zatrzymany";
        appEl.classList.remove("running");
      }
    }

    function goToNextPhase() {
      currentPhaseIndex++;

      if (currentPhaseIndex >= phases.length) {
        currentPhaseIndex = 0;
        cycleCount++;
      }

      elapsed = 0;
      // Ustaw ring od razu na "pusto" dla nowej fazy
      ringProgressEl.style.strokeDashoffset = `${CIRC}`;
      updateDisplay();
    }

    function tick() {
      const duration = phases[currentPhaseIndex].duration;

      elapsed++;

      // Jeśli faza się skończyła, przechodzimy do następnej
      if (elapsed >= duration) {
        // (opcjonalnie) dokończ ring na 100% przed skokiem (efekt "domknięcia")
        ringProgressEl.style.strokeDashoffset = `0`;
        // krótka pauza wizualna, żeby zobaczyć 100% domknięcia
        setTimeout(goToNextPhase, 120);
        return;
      }

      updateDisplay();
    }

    function startTimer() {
      if (timerId) return;
      isRunning = true;
      updateStatusUI();
      timerId = setInterval(tick, 1000);
    }

    function stopTimer() {
      if (!timerId) return;
      clearInterval(timerId);
      timerId = null;
      isRunning = false;
      updateStatusUI();
    }

    function resetTimer() {
      stopTimer();
      currentPhaseIndex = 0;
      cycleCount = 1;
      elapsed = 0;
      ringProgressEl.style.strokeDashoffset = `${CIRC}`;
      updateDisplay();
    }

    toggleBtn.addEventListener("click", () => {
      if (timerId) stopTimer();
      else startTimer();
    });

    resetBtn.addEventListener("click", resetTimer);

    // Initial render (stopped)
    updateDisplay();
    updateStatusUI();
  </script>
</body>
</html>
