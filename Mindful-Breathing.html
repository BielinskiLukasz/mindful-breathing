<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Breathing Timer (smooth + cues)</title>
  <style>
    :root{
      --bg: #111;
      --card: #171717;
      --accent: #9aa0a6;
      --accentSoft: rgba(154,160,166,0.18);
      --text: #fff;
    }

    body {
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      transition: background 220ms ease;
    }

    .container {
      text-align: center;
      padding: 24px;
      width: min(560px, 92vw);
      background: var(--card);
      border-radius: 18px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.35);
      border: 2px solid var(--accentSoft);
      transition: border-color 220ms ease;
    }

    .cycle {
      font-size: 20px;
      margin-bottom: 10px;
      color: #c7c7c7;
      opacity: 0.9;
    }

    .phase {
      font-size: 46px;
      margin-bottom: 10px;
      color: var(--accent);
      transition: color 220ms ease;
    }

    /* ====== PROGRESS RING ====== */
    .ringWrap {
      position: relative;
      width: 240px;
      height: 240px;
      margin: 8px auto 14px auto;
      display: grid;
      place-items: center;
    }

    .ringSvg {
      width: 240px;
      height: 240px;
      transform: rotate(-90deg); /* start at 12 o'clock */
      overflow: visible;
    }

    .ringBg {
      stroke: rgba(255,255,255,0.12);
    }

    .ringProgress {
      stroke: var(--accent);
      filter: drop-shadow(0 0 10px rgba(0,0,0,0.35));
      stroke-linecap: round;
      transition: stroke 220ms ease;
    }

    .ringContent {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      pointer-events: none;
    }

    .time {
      font-size: 78px;
      font-weight: 800;
      line-height: 1;
      color: var(--accent);
      transition: color 220ms ease;
    }

    .subHint {
      margin-top: 8px;
      font-size: 12px;
      color: rgba(255,255,255,0.55);
    }

    /* ====== CONTROLS ====== */
    .controls {
      display: flex;
      gap: 12px;
      justify-content: center;
      align-items: center;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    button {
      font-size: 18px;
      padding: 12px 18px;
      border: 0;
      border-radius: 12px;
      cursor: pointer;
      background: #2b2b2b;
      color: #fff;
      transition: transform 0.05s ease, background 0.2s ease;
      min-width: 120px;
    }

    button:hover { background: #3a3a3a; }
    button:active { transform: scale(0.98); }

    .resetBtn { background: #3a1f1f; }
    .resetBtn:hover { background: #4a2a2a; }

    .statusRow{
      margin-top: 12px;
      display: flex;
      justify-content: center;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap;
    }

    .status {
      font-size: 14px;
      color: #9aa0a6;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      opacity: 0.95;
    }

    .runningDot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #f44336; /* red when stopped */
      transition: background 220ms ease;
    }

    .running .runningDot { background: #4caf50; }

    .toggles{
      display: inline-flex;
      gap: 12px;
      align-items: center;
      color: rgba(255,255,255,0.75);
      font-size: 14px;
      user-select: none;
    }

    .toggles label{
      display: inline-flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }

    input[type="checkbox"]{
      width: 18px;
      height: 18px;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .hint {
      margin-top: 8px;
      font-size: 12px;
      color: rgba(255,255,255,0.45);
      line-height: 1.35;
    }
  </style>
</head>

<body>
  <div class="container" id="app">
    <div class="cycle" id="cycle">Cycle: 1</div>
    <div class="phase" id="phase">Pause</div>

    <div class="ringWrap">
      <svg class="ringSvg" viewBox="0 0 220 220" aria-hidden="true">
        <circle class="ringBg" cx="110" cy="110" r="92" fill="transparent" stroke-width="14" />
        <circle id="ringProgress" class="ringProgress" cx="110" cy="110" r="92" fill="transparent" stroke-width="14" />
      </svg>

      <div class="ringContent">
        <div>
          <div class="time" id="time">2</div>
          <div class="subHint" id="secondsLabel">seconds</div>
        </div>
      </div>
    </div>

    <div class="controls">
      <button id="toggleBtn">Start</button>
      <button id="resetBtn" class="resetBtn">Reset</button>
    </div>

    <div class="statusRow">
      <div class="status">
        <span class="runningDot"></span>
        <span id="statusText">Stopped</span>
      </div>

      <div class="toggles">
        <label><input type="checkbox" id="soundToggle" checked> Sound</label>
        <label><input type="checkbox" id="vibeToggle" checked> Vibration</label>
      </div>
    </div>

    <div class="hint" id="hint">
      If sound doesn’t play: press Start (browsers require a user gesture).<br/>
      Vibration works only on supported devices (often Android/Chrome) and usually over HTTPS.
    </div>
  </div>

  <script>
    /******************************************************************
     *  CONFIG (constants)
     ******************************************************************/
    // UI text
    const UI = Object.freeze({
      cyclePrefix: "Cycle:",
      secondsLabel: "seconds",
      statusRunning: "Running",
      statusStopped: "Stopped",
      btnStart: "Start",
      btnStop: "Stop",
      hintHtml:
        "If sound doesn’t play: press Start (browsers require a user gesture).<br/>" +
        "Vibration works only on supported devices (often Android/Chrome) and usually over HTTPS."
    });

    // Phase sequence: 2s Pause -> 4s Inhale -> 2s Pause -> 8s Exhale
    // Add/adjust durations, colors, and cue frequencies here.
    const PHASES = Object.freeze([
      { name: "Pause",  durationSec: 2, theme: { bg: "#101010", accent: "#9aa0a6" }, cue: { freqHz: 440 } },
      { name: "Inhale", durationSec: 4, theme: { bg: "#07160a", accent: "#34d399" }, cue: { freqHz: 660 } },
      { name: "Pause",  durationSec: 2, theme: { bg: "#101010", accent: "#9aa0a6" }, cue: { freqHz: 440 } },
      { name: "Exhale", durationSec: 7, theme: { bg: "#06121d", accent: "#60a5fa" }, cue: { freqHz: 330 } }
    ]);

    // Sound settings
    const SOUND = Object.freeze({
      enabledByDefault: true,
      waveform: "sine",   // "sine" | "square" | "triangle" | "sawtooth"
      volume: 0.12,       // 0..1
      beepMs: 120,        // duration of beep
      attackSec: 0.01,    // quick fade-in
      releasePadSec: 0.02 // small padding to avoid clicks
    });

    // Vibration settings
    const VIBRATION = Object.freeze({
      enabledByDefault: true,
      pattern: [55, 40, 55] // ms pattern
    });

    // Progress ring settings (must match SVG attributes where relevant)
    const RING = Object.freeze({
      radius: 92,
      strokeWidth: 14
    });

    // Countdown behaviour
    const COUNTDOWN = Object.freeze({
      minShownSeconds: 1 // show 4..1 (never show 0)
    });

    /******************************************************************
     *  STATE
     ******************************************************************/
    let currentPhaseIndex = 0;
    let cycleCount = 1;

    // Smooth phase time (ms)
    let elapsedMs = 0;        // elapsed within current phase (kept on pause)
    let phaseStartTs = null;  // performance.now() - elapsedMs

    // requestAnimationFrame
    let rafId = null;
    let isRunning = false;

    // Audio (created on first Start click)
    let audioCtx = null;

    /******************************************************************
     *  DOM
     ******************************************************************/
    const appEl = document.getElementById("app");
    const phaseEl = document.getElementById("phase");
    const timeEl = document.getElementById("time");
    const cycleEl = document.getElementById("cycle");
    const toggleBtn = document.getElementById("toggleBtn");
    const resetBtn = document.getElementById("resetBtn");
    const statusText = document.getElementById("statusText");
    const ringProgressEl = document.getElementById("ringProgress");
    const secondsLabelEl = document.getElementById("secondsLabel");
    const hintEl = document.getElementById("hint");

    const soundToggle = document.getElementById("soundToggle");
    const vibeToggle = document.getElementById("vibeToggle");

    // Apply default toggle states + UI text
    soundToggle.checked = SOUND.enabledByDefault;
    vibeToggle.checked = VIBRATION.enabledByDefault;
    secondsLabelEl.textContent = UI.secondsLabel;
    hintEl.innerHTML = UI.hintHtml;

    /******************************************************************
     *  RING GEOMETRY
     ******************************************************************/
    const CIRC = 2 * Math.PI * RING.radius;
    ringProgressEl.style.strokeDasharray = String(CIRC);
    ringProgressEl.style.strokeDashoffset = String(CIRC); // empty at start

    /******************************************************************
     *  HELPERS
     ******************************************************************/
    function hexToRgba(hex, alpha) {
      const h = hex.replace("#", "");
      const full = h.length === 3 ? h.split("").map(c => c + c).join("") : h;
      const r = parseInt(full.slice(0, 2), 16);
      const g = parseInt(full.slice(2, 4), 16);
      const b = parseInt(full.slice(4, 6), 16);
      return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

    function getPhase() {
      return PHASES[currentPhaseIndex];
    }

    function applyThemeForCurrentPhase() {
      const { bg, accent } = getPhase().theme;
      document.body.style.setProperty("--bg", bg);
      document.documentElement.style.setProperty("--accent", accent);
      document.documentElement.style.setProperty("--accentSoft", hexToRgba(accent, 0.22));
      appEl.style.borderColor = hexToRgba(accent, 0.22);
    }

    /******************************************************************
     *  SOUND / VIBRATION
     ******************************************************************/
    async function ensureAudio() {
      if (!soundToggle.checked) return;

      if (audioCtx) {
        if (audioCtx.state === "suspended") {
          try { await audioCtx.resume(); } catch (_) {}
        }
        return;
      }

      const AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) return;

      audioCtx = new AC();
      if (audioCtx.state === "suspended") {
        try { await audioCtx.resume(); } catch (_) {}
      }
    }

    function playBeep(freqHz, ms = SOUND.beepMs, volume = SOUND.volume) {
      if (!soundToggle.checked) return;
      if (!audioCtx) return;

      const t0 = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();

      osc.type = SOUND.waveform;
      osc.frequency.setValueAtTime(freqHz, t0);

      // Envelope: quick attack + exponential decay (reduces clicks)
      gain.gain.setValueAtTime(0.0001, t0);
      gain.gain.exponentialRampToValueAtTime(volume, t0 + SOUND.attackSec);
      gain.gain.exponentialRampToValueAtTime(0.0001, t0 + ms / 1000);

      osc.connect(gain);
      gain.connect(audioCtx.destination);

      osc.start(t0);
      osc.stop(t0 + ms / 1000 + SOUND.releasePadSec);
    }

    function vibrate(pattern = VIBRATION.pattern) {
      if (!vibeToggle.checked) return;
      if (!("vibrate" in navigator)) return;
      try { navigator.vibrate(pattern); } catch (_) {}
    }

    function cueOnPhaseEnter(phaseIndex) {
      const phase = PHASES[phaseIndex];
      const freqHz = phase?.cue?.freqHz ?? 520;
      playBeep(freqHz);
      vibrate();
    }

    /******************************************************************
     *  RENDER
     ******************************************************************/
    function render(progress01, secondsLeftInt) {
      const offset = CIRC * (1 - progress01);
      ringProgressEl.style.strokeDashoffset = String(offset);

      cycleEl.textContent = `${UI.cyclePrefix} ${cycleCount}`;
      phaseEl.textContent = getPhase().name;

      // Update countdown only when it changes
      const nextText = String(secondsLeftInt);
      if (timeEl.textContent !== nextText) {
        timeEl.textContent = nextText;
      }

      applyThemeForCurrentPhase();
    }

    /******************************************************************
     *  PHASE ADVANCE
     ******************************************************************/
    function nextPhaseIndex() {
      return (currentPhaseIndex + 1) % PHASES.length;
    }

    function advanceToNextPhase(nowTs) {
      const isLastPhase = currentPhaseIndex === PHASES.length - 1;
      const nextIdx = nextPhaseIndex();

      if (isLastPhase) cycleCount++;

      currentPhaseIndex = nextIdx;
      elapsedMs = 0;
      phaseStartTs = nowTs;

      cueOnPhaseEnter(currentPhaseIndex);
    }

    /******************************************************************
     *  MAIN LOOP (smooth animation)
     ******************************************************************/
    function loop(nowTs) {
      if (!isRunning) return;

      const durationMs = getPhase().durationSec * 1000;

      if (phaseStartTs == null) {
        phaseStartTs = nowTs - elapsedMs;
      }

      elapsedMs = nowTs - phaseStartTs;

      const progress = elapsedMs / durationMs;

      if (progress >= 1) {
        // Close ring for the last frame of this phase
        render(1, COUNTDOWN.minShownSeconds);

        // Switch phase
        advanceToNextPhase(nowTs);

        // Show start of new phase immediately
        render(0, getPhase().durationSec);

        rafId = requestAnimationFrame(loop);
        return;
      }

      // Countdown: show 4..1 (no 0)
      const secondsLeft = Math.max(
        COUNTDOWN.minShownSeconds,
        Math.ceil((durationMs - elapsedMs) / 1000)
      );

      render(progress, secondsLeft);
      rafId = requestAnimationFrame(loop);
    }

    /******************************************************************
     *  CONTROLS
     ******************************************************************/
    function updateStatusUI() {
      if (isRunning) {
        toggleBtn.textContent = UI.btnStop;
        statusText.textContent = UI.statusRunning;
        appEl.classList.add("running");
      } else {
        toggleBtn.textContent = UI.btnStart;
        statusText.textContent = UI.statusStopped;
        appEl.classList.remove("running");
      }
    }

    async function start() {
      if (isRunning) return;
      isRunning = true;

      await ensureAudio();

      const now = performance.now();
      phaseStartTs = now - elapsedMs;

      updateStatusUI();
      rafId = requestAnimationFrame(loop);
    }

    function stop() {
      if (!isRunning) return;
      isRunning = false;

      if (rafId) cancelAnimationFrame(rafId);
      rafId = null;

      updateStatusUI();
    }

    function reset() {
      stop();
      currentPhaseIndex = 0;
      cycleCount = 1;
      elapsedMs = 0;
      phaseStartTs = null;

      render(0, getPhase().durationSec);
    }

    toggleBtn.addEventListener("click", () => {
      if (isRunning) stop();
      else start();
    });

    resetBtn.addEventListener("click", reset);

    // ====== Init (no cue on load) ======
    render(0, getPhase().durationSec);
    updateStatusUI();
  </script>
</body>
</html>
