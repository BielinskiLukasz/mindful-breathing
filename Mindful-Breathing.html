<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Minutnik oddechowy (smooth + cue)</title>
  <style>
    :root{
      --bg: #111;
      --card: #171717;
      --accent: #9aa0a6;
      --accentSoft: rgba(154,160,166,0.18);
      --text: #fff;
    }

    body {
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      transition: background 220ms ease;
    }

    .container {
      text-align: center;
      padding: 24px;
      width: min(560px, 92vw);
      background: var(--card);
      border-radius: 18px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.35);
      border: 2px solid var(--accentSoft);
      transition: border-color 220ms ease;
    }

    .cycle {
      font-size: 20px;
      margin-bottom: 10px;
      color: #c7c7c7;
      opacity: 0.9;
    }

    .phase {
      font-size: 46px;
      margin-bottom: 10px;
      color: var(--accent);
      transition: color 220ms ease;
    }

    /* ====== PROGRESS RING ====== */
    .ringWrap {
      position: relative;
      width: 240px;
      height: 240px;
      margin: 8px auto 14px auto;
      display: grid;
      place-items: center;
    }

    .ringSvg {
      width: 240px;
      height: 240px;
      transform: rotate(-90deg); /* start at 12 o'clock */
      overflow: visible;
    }

    .ringBg {
      stroke: rgba(255,255,255,0.12);
    }

    .ringProgress {
      stroke: var(--accent);
      filter: drop-shadow(0 0 10px rgba(0,0,0,0.35));
      stroke-linecap: round;
      transition: stroke 220ms ease;
    }

    .ringContent {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      pointer-events: none;
    }

    .time {
      font-size: 78px;
      font-weight: 800;
      line-height: 1;
      color: var(--accent);
      transition: color 220ms ease;
    }

    .subHint {
      margin-top: 8px;
      font-size: 12px;
      color: rgba(255,255,255,0.55);
    }

    /* ====== CONTROLS ====== */
    .controls {
      display: flex;
      gap: 12px;
      justify-content: center;
      align-items: center;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    button {
      font-size: 18px;
      padding: 12px 18px;
      border: 0;
      border-radius: 12px;
      cursor: pointer;
      background: #2b2b2b;
      color: #fff;
      transition: transform 0.05s ease, background 0.2s ease;
      min-width: 120px;
    }

    button:hover { background: #3a3a3a; }
    button:active { transform: scale(0.98); }

    .resetBtn { background: #3a1f1f; }
    .resetBtn:hover { background: #4a2a2a; }

    .statusRow{
      margin-top: 12px;
      display: flex;
      justify-content: center;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap;
    }

    .status {
      font-size: 14px;
      color: #9aa0a6;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      opacity: 0.95;
    }

    .runningDot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #f44336; /* red when stopped */
      transition: background 220ms ease;
    }

    .running .runningDot { background: #4caf50; }

    .toggles{
      display: inline-flex;
      gap: 12px;
      align-items: center;
      color: rgba(255,255,255,0.75);
      font-size: 14px;
      user-select: none;
    }

    .toggles label{
      display: inline-flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }

    input[type="checkbox"]{
      width: 18px;
      height: 18px;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .hint {
      margin-top: 8px;
      font-size: 12px;
      color: rgba(255,255,255,0.45);
      line-height: 1.35;
    }
  </style>
</head>

<body>
  <div class="container" id="app">
    <div class="cycle" id="cycle">Powtórzenie: 1</div>
    <div class="phase" id="phase">Przerwa</div>

    <div class="ringWrap">
      <svg class="ringSvg" viewBox="0 0 220 220" aria-hidden="true">
        <circle class="ringBg" cx="110" cy="110" r="92" fill="transparent" stroke-width="14" />
        <circle id="ringProgress" class="ringProgress" cx="110" cy="110" r="92" fill="transparent" stroke-width="14" />
      </svg>

      <div class="ringContent">
        <div>
          <div class="time" id="time">2</div>
          <div class="subHint">sekundy</div>
        </div>
      </div>
    </div>

    <div class="controls">
      <button id="toggleBtn">Start</button>
      <button id="resetBtn" class="resetBtn">Reset</button>
    </div>

    <div class="statusRow">
      <div class="status">
        <span class="runningDot"></span>
        <span id="statusText">Zatrzymany</span>
      </div>

      <div class="toggles">
        <label><input type="checkbox" id="soundToggle" checked> Dźwięk</label>
        <label><input type="checkbox" id="vibeToggle" checked> Wibracja</label>
      </div>
    </div>

    <div class="hint">
      Jeśli dźwięk nie działa: kliknij Start (przeglądarki wymagają interakcji).<br/>
      Wibracja działa tylko na wspieranych urządzeniach (często Android/Chrome) i zwykle na HTTPS.
    </div>
  </div>

  <script>
    // ====== Konfiguracja faz ======
    const phases = [
      { name: "Przerwa", duration: 2, theme: { bg: "#101010", accent: "#9aa0a6" }, cue: { freq: 440 } },
      { name: "Wdech",   duration: 4, theme: { bg: "#07160a", accent: "#34d399" }, cue: { freq: 660 } },
      { name: "Przerwa", duration: 2, theme: { bg: "#101010", accent: "#9aa0a6" }, cue: { freq: 440 } },
      { name: "Wydech",  duration: 8, theme: { bg: "#06121d", accent: "#60a5fa" }, cue: { freq: 330 } }
    ];

    // ====== Stan ======
    let currentPhaseIndex = 0;
    let cycleCount = 1;

    // Płynny czas w fazie (ms)
    let elapsedMs = 0;          // ile minęło w aktualnej fazie
    let phaseStartTs = null;    // performance.now() - elapsedMs

    // requestAnimationFrame
    let rafId = null;
    let isRunning = false;

    // Audio
    let audioCtx = null;        // AudioContext inicjalizowany po kliknięciu Start

    // ====== DOM ======
    const appEl = document.getElementById("app");
    const phaseEl = document.getElementById("phase");
    const timeEl = document.getElementById("time");
    const cycleEl = document.getElementById("cycle");
    const toggleBtn = document.getElementById("toggleBtn");
    const resetBtn = document.getElementById("resetBtn");
    const statusText = document.getElementById("statusText");
    const ringProgressEl = document.getElementById("ringProgress");

    const soundToggle = document.getElementById("soundToggle");
    const vibeToggle = document.getElementById("vibeToggle");

    // ====== Ring geometry ======
    const RADIUS = 92;
    const CIRC = 2 * Math.PI * RADIUS;
    ringProgressEl.style.strokeDasharray = `${CIRC}`;
    ringProgressEl.style.strokeDashoffset = `${CIRC}`; // pusty start

    function hexToRgba(hex, alpha) {
      const h = hex.replace("#", "");
      const full = h.length === 3 ? h.split("").map(c => c + c).join("") : h;
      const r = parseInt(full.slice(0, 2), 16);
      const g = parseInt(full.slice(2, 4), 16);
      const b = parseInt(full.slice(4, 6), 16);
      return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

    function applyThemeForCurrentPhase() {
      const { bg, accent } = phases[currentPhaseIndex].theme;
      document.body.style.setProperty("--bg", bg);
      document.documentElement.style.setProperty("--accent", accent);
      document.documentElement.style.setProperty("--accentSoft", hexToRgba(accent, 0.22));
      appEl.style.borderColor = hexToRgba(accent, 0.22);
    }

    // ====== Dźwięk / wibracja ======
    async function ensureAudio() {
      if (!soundToggle.checked) return;
      if (audioCtx) {
        // czasem po pauzie/lock screen może być "suspended"
        if (audioCtx.state === "suspended") {
          try { await audioCtx.resume(); } catch (e) {}
        }
        return;
      }
      const AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) return;
      audioCtx = new AC();
      if (audioCtx.state === "suspended") {
        try { await audioCtx.resume(); } catch (e) {}
      }
    }

    function playBeep(freq = 520, ms = 110, volume = 0.12) {
      if (!soundToggle.checked) return;
      if (!audioCtx) return;

      const t0 = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();

      osc.type = "sine";
      osc.frequency.setValueAtTime(freq, t0);

      // envelope: szybkie wejście + wyciszenie
      gain.gain.setValueAtTime(0.0001, t0);
      gain.gain.exponentialRampToValueAtTime(volume, t0 + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, t0 + ms / 1000);

      osc.connect(gain);
      gain.connect(audioCtx.destination);

      osc.start(t0);
      osc.stop(t0 + ms / 1000 + 0.02);
    }

    function vibrate(pattern = [60]) {
      if (!vibeToggle.checked) return;
      if (!("vibrate" in navigator)) return;
      try { navigator.vibrate(pattern); } catch(e) {}
    }

    function cueOnPhaseChange(nextPhaseIndex) {
      // cue dla fazy, do której wchodzimy
      const cue = phases[nextPhaseIndex]?.cue || { freq: 520 };

      // dźwięk + wibracja
      playBeep(cue.freq, 120, 0.12);

      // krótki, przyjemny pattern
      vibrate([55, 40, 55]);
    }

    // ====== Render ======
    function render(progress01, secondsLeftInt) {
      const offset = CIRC * (1 - progress01);
      ringProgressEl.style.strokeDashoffset = `${offset}`;

      cycleEl.textContent = "Powtórzenie: " + cycleCount;
      phaseEl.textContent = phases[currentPhaseIndex].name;

      if (timeEl.textContent !== String(secondsLeftInt)) {
        timeEl.textContent = secondsLeftInt;
      }

      applyThemeForCurrentPhase();
    }

    function computeNextPhaseIndex() {
      let idx = currentPhaseIndex + 1;
      if (idx >= phases.length) idx = 0;
      return idx;
    }

    function advanceToNextPhase(nowTs) {
      // Ustal, do jakiej fazy przechodzimy
      const nextIdx = computeNextPhaseIndex();

      // Zwiększ powtórzenie, jeśli domknęliśmy cały cykl
      if (currentPhaseIndex === phases.length - 1) {
        cycleCount++;
      }

      // Przejście
      currentPhaseIndex = nextIdx;
      elapsedMs = 0;
      phaseStartTs = nowTs;

      // Cue na wejściu w nową fazę
      cueOnPhaseChange(currentPhaseIndex);
    }

    function loop(nowTs) {
      if (!isRunning) return;

      const durationSec = phases[currentPhaseIndex].duration;
      const durationMs = durationSec * 1000;

      if (phaseStartTs == null) {
        phaseStartTs = nowTs - elapsedMs;
      }

      elapsedMs = nowTs - phaseStartTs;
      let progress = elapsedMs / durationMs;

      if (progress >= 1) {
        // domknij ring do 100% na ten frame
        render(1, 1);

        // przejdź do następnej fazy
        advanceToNextPhase(nowTs);

        // od razu pokaż początek nowej fazy (0% i pełne sekundy)
        render(0, phases[currentPhaseIndex].duration);

        rafId = requestAnimationFrame(loop);
        return;
      }

      // Sekundy w dół: 4,3,2,1 (bez 0)
      const secondsLeft = Math.max(1, Math.ceil((durationMs - elapsedMs) / 1000));
      render(progress, secondsLeft);

      rafId = requestAnimationFrame(loop);
    }

    function updateStatusUI() {
      if (isRunning) {
        toggleBtn.textContent = "Stop";
        statusText.textContent = "W trakcie";
        appEl.classList.add("running");
      } else {
        toggleBtn.textContent = "Start";
        statusText.textContent = "Zatrzymany";
        appEl.classList.remove("running");
      }
    }

    async function start() {
      if (isRunning) return;
      isRunning = true;

      // Audio init/resume po interakcji użytkownika
      await ensureAudio();

      const now = performance.now();
      phaseStartTs = now - elapsedMs;

      updateStatusUI();
      rafId = requestAnimationFrame(loop);
    }

    function stop() {
      if (!isRunning) return;
      isRunning = false;

      if (rafId) cancelAnimationFrame(rafId);
      rafId = null;

      updateStatusUI();
    }

    function reset() {
      stop();
      currentPhaseIndex = 0;
      cycleCount = 1;
      elapsedMs = 0;
      phaseStartTs = null;

      render(0, phases[0].duration);
      // opcjonalnie cue przy resecie: odkomentuj jeśli chcesz
      // cueOnPhaseChange(0);
    }

    toggleBtn.addEventListener("click", () => {
      if (isRunning) stop();
      else start();
    });

    resetBtn.addEventListener("click", reset);

    // Init (bez cue na starcie)
    render(0, phases[0].duration);
    updateStatusUI();
  </script>
</body>
</html>
