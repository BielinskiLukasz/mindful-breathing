<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Minutnik oddechowy (smooth)</title>
  <style>
    :root{
      --bg: #111;
      --card: #171717;
      --accent: #9aa0a6;
      --accentSoft: rgba(154,160,166,0.18);
      --text: #fff;
    }

    body {
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      transition: background 220ms ease;
    }

    .container {
      text-align: center;
      padding: 24px;
      width: min(520px, 92vw);
      background: var(--card);
      border-radius: 18px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.35);
      border: 2px solid var(--accentSoft);
      transition: border-color 220ms ease;
    }

    .cycle {
      font-size: 20px;
      margin-bottom: 10px;
      color: #c7c7c7;
      opacity: 0.9;
    }

    .phase {
      font-size: 46px;
      margin-bottom: 10px;
      color: var(--accent);
      transition: color 220ms ease;
    }

    /* ====== PROGRESS RING ====== */
    .ringWrap {
      position: relative;
      width: 240px;
      height: 240px;
      margin: 8px auto 18px auto;
      display: grid;
      place-items: center;
    }

    .ringSvg {
      width: 240px;
      height: 240px;
      transform: rotate(-90deg); /* start at 12 o'clock */
      overflow: visible;
    }

    .ringBg {
      stroke: rgba(255,255,255,0.12);
    }

    .ringProgress {
      stroke: var(--accent);
      filter: drop-shadow(0 0 10px rgba(0,0,0,0.35));
      stroke-linecap: round;
      transition: stroke 220ms ease;
    }

    .ringContent {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      pointer-events: none;
    }

    .time {
      font-size: 78px;
      font-weight: 800;
      line-height: 1;
      color: var(--accent);
      transition: color 220ms ease;
    }

    .subHint {
      margin-top: 8px;
      font-size: 12px;
      color: rgba(255,255,255,0.55);
    }

    /* ====== CONTROLS ====== */
    .controls {
      display: flex;
      gap: 12px;
      justify-content: center;
      align-items: center;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    button {
      font-size: 18px;
      padding: 12px 18px;
      border: 0;
      border-radius: 12px;
      cursor: pointer;
      background: #2b2b2b;
      color: #fff;
      transition: transform 0.05s ease, background 0.2s ease;
      min-width: 120px;
    }

    button:hover { background: #3a3a3a; }
    button:active { transform: scale(0.98); }

    .resetBtn {
      background: #3a1f1f;
    }
    .resetBtn:hover {
      background: #4a2a2a;
    }

    .status {
      margin-top: 14px;
      font-size: 14px;
      color: #9aa0a6;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      opacity: 0.95;
    }

    .runningDot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #f44336; /* red when stopped */
      transition: background 220ms ease;
    }

    .running .runningDot {
      background: #4caf50; /* green when running */
    }
  </style>
</head>

<body>
  <div class="container" id="app">
    <div class="cycle" id="cycle">Powtórzenie: 1</div>
    <div class="phase" id="phase">Przerwa</div>

    <div class="ringWrap">
      <svg class="ringSvg" viewBox="0 0 220 220" aria-hidden="true">
        <circle class="ringBg" cx="110" cy="110" r="92" fill="transparent" stroke-width="14" />
        <circle id="ringProgress" class="ringProgress" cx="110" cy="110" r="92" fill="transparent" stroke-width="14" />
      </svg>

      <div class="ringContent">
        <div>
          <div class="time" id="time">2</div>
          <div class="subHint">sekundy</div>
        </div>
      </div>
    </div>

    <div class="controls">
      <button id="toggleBtn">Start</button>
      <button id="resetBtn" class="resetBtn">Reset</button>
    </div>

    <div class="status">
      <span class="runningDot"></span>
      <span id="statusText">Zatrzymany</span>
    </div>
  </div>

  <script>
    // Fazy i kolory
    const phases = [
      { name: "Przerwa", duration: 2, theme: { bg: "#101010", accent: "#9aa0a6" } },
      { name: "Wdech",   duration: 4, theme: { bg: "#07160a", accent: "#34d399" } }, // zielony
      { name: "Przerwa", duration: 2, theme: { bg: "#101010", accent: "#9aa0a6" } },
      { name: "Wydech",  duration: 8, theme: { bg: "#06121d", accent: "#60a5fa" } }  // niebieski
    ];

    // Stan
    let currentPhaseIndex = 0;
    let cycleCount = 1;

    // Płynny czas w fazie (ms)
    let elapsedMs = 0;          // ile już minęło w aktualnej fazie (przy pauzie zostaje)
    let phaseStartTs = null;    // timestamp startu fazy (performance.now() - elapsedMs)

    // requestAnimationFrame
    let rafId = null;
    let isRunning = false;

    // DOM
    const appEl = document.getElementById("app");
    const phaseEl = document.getElementById("phase");
    const timeEl = document.getElementById("time");
    const cycleEl = document.getElementById("cycle");
    const toggleBtn = document.getElementById("toggleBtn");
    const resetBtn = document.getElementById("resetBtn");
    const statusText = document.getElementById("statusText");
    const ringProgressEl = document.getElementById("ringProgress");

    // Ring geometry
    const RADIUS = 92;
    const CIRC = 2 * Math.PI * RADIUS;
    ringProgressEl.style.strokeDasharray = `${CIRC}`;
    ringProgressEl.style.strokeDashoffset = `${CIRC}`; // 0% na starcie (pusto)

    function hexToRgba(hex, alpha) {
      const h = hex.replace("#", "");
      const full = h.length === 3 ? h.split("").map(c => c + c).join("") : h;
      const r = parseInt(full.slice(0, 2), 16);
      const g = parseInt(full.slice(2, 4), 16);
      const b = parseInt(full.slice(4, 6), 16);
      return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

    function applyThemeForCurrentPhase() {
      const { bg, accent } = phases[currentPhaseIndex].theme;
      document.body.style.setProperty("--bg", bg);
      document.documentElement.style.setProperty("--accent", accent);
      document.documentElement.style.setProperty("--accentSoft", hexToRgba(accent, 0.22));
      appEl.style.borderColor = hexToRgba(accent, 0.22);
    }

    function render(progress01, secondsLeftInt) {
      // Ring: CIRC (pusto) -> 0 (pełne)
      const offset = CIRC * (1 - progress01);
      ringProgressEl.style.strokeDashoffset = `${offset}`;

      // Teksty
      cycleEl.textContent = "Powtórzenie: " + cycleCount;
      phaseEl.textContent = phases[currentPhaseIndex].name;

      // Uaktualniaj licznik tylko gdy wartość się zmienia (mniej "mrugania")
      if (timeEl.textContent !== String(secondsLeftInt)) {
        timeEl.textContent = secondsLeftInt;
      }

      applyThemeForCurrentPhase();
    }

    function goToNextPhase(nowTs) {
      currentPhaseIndex++;
      if (currentPhaseIndex >= phases.length) {
        currentPhaseIndex = 0;
        cycleCount++;
      }

      // Reset czasu fazy
      elapsedMs = 0;
      phaseStartTs = nowTs; // nowy start fazy od teraz
    }

    function loop(nowTs) {
      if (!isRunning) return;

      const durationSec = phases[currentPhaseIndex].duration;
      const durationMs = durationSec * 1000;

      if (phaseStartTs == null) {
        // zabezpieczenie
        phaseStartTs = nowTs - elapsedMs;
      }

      // Aktualny upływ ms od startu fazy (+ uwzględnia pauzę)
      elapsedMs = nowTs - phaseStartTs;

      // Progres 0..1
      let progress = elapsedMs / durationMs;

      if (progress >= 1) {
        // Domknij ring, pokaż 1 jeszcze przez ułamek chwili
        render(1, 1);

        // Przejdź do następnej fazy (bez opóźnień, ale płynnie)
        goToNextPhase(nowTs);
        // Po przejściu ustaw progress dla nowej fazy na 0
        render(0, phases[currentPhaseIndex].duration);

        rafId = requestAnimationFrame(loop);
        return;
      }

      // Sekundy w dół: 4,3,2,1 (bez 0)
      const secondsLeft = Math.max(1, Math.ceil((durationMs - elapsedMs) / 1000));

      render(progress, secondsLeft);

      rafId = requestAnimationFrame(loop);
    }

    function updateStatusUI() {
      if (isRunning) {
        toggleBtn.textContent = "Stop";
        statusText.textContent = "W trakcie";
        appEl.classList.add("running");
      } else {
        toggleBtn.textContent = "Start";
        statusText.textContent = "Zatrzymany";
        appEl.classList.remove("running");
      }
    }

    function start() {
      if (isRunning) return;
      isRunning = true;

      // Wznawianie: ustawiamy start tak, by elapsedMs było zachowane
      const now = performance.now();
      phaseStartTs = now - elapsedMs;

      updateStatusUI();
      rafId = requestAnimationFrame(loop);
    }

    function stop() {
      if (!isRunning) return;
      isRunning = false;

      if (rafId) cancelAnimationFrame(rafId);
      rafId = null;

      // elapsedMs zostaje (żeby wznowić w tym samym miejscu)
      updateStatusUI();
    }

    function reset() {
      stop();
      currentPhaseIndex = 0;
      cycleCount = 1;
      elapsedMs = 0;
      phaseStartTs = null;

      // UI do stanu początkowego
      const duration = phases[0].duration;
      render(0, duration);
    }

    toggleBtn.addEventListener("click", () => {
      if (isRunning) stop();
      else start();
    });

    resetBtn.addEventListener("click", reset);

    // Init
    render(0, phases[0].duration);
    updateStatusUI();
  </script>
</body>
</html>
