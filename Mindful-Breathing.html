<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Minutnik oddechowy</title>
  <style>
    :root{
      --bg: #111;
      --card: #171717;
      --accent: #9aa0a6;
      --accentSoft: rgba(154,160,166,0.18);
      --text: #fff;
    }

    body {
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      transition: background 220ms ease;
    }

    .container {
      text-align: center;
      padding: 24px;
      width: min(520px, 92vw);
      background: var(--card);
      border-radius: 18px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.35);
      border: 2px solid var(--accentSoft);
      transition: border-color 220ms ease, transform 220ms ease;
    }

    .cycle {
      font-size: 20px;
      margin-bottom: 10px;
      color: #c7c7c7;
      opacity: 0.9;
    }

    .phase {
      font-size: 46px;
      margin-bottom: 10px;
      color: var(--accent);
      transition: color 220ms ease;
    }

    .time {
      font-size: 76px;
      font-weight: 800;
      line-height: 1;
      margin-bottom: 18px;
      color: var(--accent);
      transition: color 220ms ease;
    }

    .controls {
      display: flex;
      gap: 12px;
      justify-content: center;
      align-items: center;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    button {
      font-size: 18px;
      padding: 12px 18px;
      border: 0;
      border-radius: 12px;
      cursor: pointer;
      background: #2b2b2b;
      color: #fff;
      transition: transform 0.05s ease, background 0.2s ease;
      min-width: 120px;
    }

    button:hover { background: #3a3a3a; }
    button:active { transform: scale(0.98); }

    .resetBtn {
      background: #3a1f1f;
    }
    .resetBtn:hover {
      background: #4a2a2a;
    }

    .status {
      margin-top: 14px;
      font-size: 14px;
      color: #9aa0a6;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      opacity: 0.95;
    }

    .runningDot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #f44336; /* red when stopped */
      transition: background 220ms ease;
    }

    .running .runningDot {
      background: #4caf50; /* green when running */
    }

    /* Mały pasek-akcent pod timerem (opcjonalnie, wygląda fajnie) */
    .accentBar {
      height: 6px;
      width: 180px;
      margin: 0 auto 6px auto;
      border-radius: 999px;
      background: var(--accentSoft);
      transition: background 220ms ease;
    }
  </style>
</head>

<body>
  <div class="container" id="app">
    <div class="cycle" id="cycle">Powtórzenie: 1</div>
    <div class="phase" id="phase">Przerwa</div>
    <div class="time" id="time">2</div>
    <div class="accentBar" id="accentBar"></div>

    <div class="controls">
      <button id="toggleBtn">Start</button>
      <button id="resetBtn" class="resetBtn">Reset</button>
    </div>

    <div class="status" id="status">
      <span class="runningDot"></span>
      <span id="statusText">Zatrzymany</span>
    </div>
  </div>

  <script>
    // Konfiguracja faz
    const phases = [
      { name: "Przerwa", duration: 2, theme: { bg: "#101010", accent: "#9aa0a6" } },
      { name: "Wdech",   duration: 4, theme: { bg: "#07160a", accent: "#34d399" } }, // zielony
      { name: "Przerwa", duration: 2, theme: { bg: "#101010", accent: "#9aa0a6" } },
      { name: "Wydech",  duration: 8, theme: { bg: "#06121d", accent: "#60a5fa" } }  // niebieski
    ];

    let currentPhaseIndex = 0;
    let timeLeft = phases[0].duration;
    let cycleCount = 1;

    let timerId = null;
    let isRunning = false;

    const appEl = document.getElementById("app");
    const phaseEl = document.getElementById("phase");
    const timeEl = document.getElementById("time");
    const cycleEl = document.getElementById("cycle");
    const toggleBtn = document.getElementById("toggleBtn");
    const resetBtn = document.getElementById("resetBtn");
    const statusText = document.getElementById("statusText");
    const accentBar = document.getElementById("accentBar");

    function applyThemeForCurrentPhase() {
      const { bg, accent } = phases[currentPhaseIndex].theme;

      // Kolor tła strony + akcenty
      document.body.style.setProperty("--bg", bg);
      document.documentElement.style.setProperty("--accent", accent);
      document.documentElement.style.setProperty("--accentSoft", hexToRgba(accent, 0.22));

      // Pasek akcentu
      accentBar.style.background = hexToRgba(accent, 0.22);
      // Obramowanie karty (delikatne)
      appEl.style.borderColor = hexToRgba(accent, 0.22);
    }

    function hexToRgba(hex, alpha) {
      // Obsługa skrótu #abc i pełnego #aabbcc
      const h = hex.replace("#", "");
      const full = h.length === 3 ? h.split("").map(c => c + c).join("") : h;
      const r = parseInt(full.slice(0, 2), 16);
      const g = parseInt(full.slice(2, 4), 16);
      const b = parseInt(full.slice(4, 6), 16);
      return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

    function updateDisplay() {
      phaseEl.textContent = phases[currentPhaseIndex].name;
      timeEl.textContent = timeLeft;
      cycleEl.textContent = "Powtórzenie: " + cycleCount;
      applyThemeForCurrentPhase();
    }

    function updateStatusUI() {
      if (isRunning) {
        toggleBtn.textContent = "Stop";
        statusText.textContent = "W trakcie";
        appEl.classList.add("running");
      } else {
        toggleBtn.textContent = "Start";
        statusText.textContent = "Zatrzymany";
        appEl.classList.remove("running");
      }
    }

    function nextPhase() {
      currentPhaseIndex++;

      if (currentPhaseIndex >= phases.length) {
        currentPhaseIndex = 0;
        cycleCount++;
      }

      timeLeft = phases[currentPhaseIndex].duration;
      updateDisplay();
    }

    function tick() {
      timeLeft--;

      if (timeLeft <= 0) {
        nextPhase();
      } else {
        timeEl.textContent = timeLeft;
      }
    }

    function startTimer() {
      if (timerId) return; // already running
      isRunning = true;
      updateStatusUI();
      timerId = setInterval(tick, 1000);
    }

    function stopTimer() {
      if (!timerId) return;
      clearInterval(timerId);
      timerId = null;
      isRunning = false;
      updateStatusUI();
    }

    function resetTimer() {
      stopTimer();
      currentPhaseIndex = 0;
      cycleCount = 1;
      timeLeft = phases[0].duration;
      updateDisplay();
    }

    toggleBtn.addEventListener("click", () => {
      if (timerId) stopTimer();
      else startTimer();
    });

    resetBtn.addEventListener("click", resetTimer);

    // Initial render (stopped)
    updateDisplay();
    updateStatusUI();
  </script>
</body>
</html>
