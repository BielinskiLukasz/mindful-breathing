<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Breathing Timer (smooth + cues)</title>
  <style>
    :root{
      --bg: #111;
      --card: #171717;
      --accent: #9aa0a6;
      --accentSoft: rgba(154,160,166,0.18);
      --text: #fff;
    }

    body {
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      transition: background 220ms ease;
    }

    .container {
      position: relative;
      text-align: center;
      padding: 24px;
      width: min(560px, 92vw);
      background: var(--card);
      border-radius: 18px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.35);
      border: 2px solid var(--accentSoft);
      transition: border-color 220ms ease;
    }

    .cycle {
      font-size: 20px;
      margin-bottom: 10px;
      color: #c7c7c7;
      opacity: 0.9;
    }

    .phase {
      font-size: 46px;
      margin-bottom: 10px;
      color: var(--accent);
      transition: color 220ms ease;
    }

    @keyframes phaseFadeIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .phase.phaseChange { animation: phaseFadeIn 280ms ease forwards; }

    /* ====== PROGRESS RING ====== */
    .ringWrap {
      position: relative;
      width: 240px;
      height: 240px;
      margin: 8px auto 14px auto;
      display: grid;
      place-items: center;
    }

    .ringSvg {
      width: 240px;
      height: 240px;
      transform: rotate(-90deg); /* start at 12 o'clock */
      overflow: visible;
    }

    .ringBg {
      stroke: rgba(255,255,255,0.12);
    }

    .ringProgress {
      stroke: var(--accent);
      filter: drop-shadow(0 0 10px rgba(0,0,0,0.35));
      stroke-linecap: round;
      transition: stroke 220ms ease;
    }

    .ringContent {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      pointer-events: none;
    }

    .breathCircle {
      position: absolute;
      border-radius: 50%;
      background: var(--accent);
      opacity: 0.2;
      transition: background 220ms ease;
      pointer-events: none;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
    }

    @keyframes idlePulse {
      0%, 100% { width: 48px; height: 48px; opacity: 0.12; }
      50%       { width: 108px; height: 108px; opacity: 0.22; }
    }

    .breathCircle.idle {
      animation: idlePulse 5s ease-in-out infinite;
    }

    .time {
      font-size: 78px;
      font-weight: 800;
      line-height: 1;
      color: var(--accent);
      transition: color 220ms ease;
    }

    .subHint {
      margin-top: 8px;
      font-size: 12px;
      color: rgba(255,255,255,0.55);
    }

    /* ====== PRESETS ====== */
    .presets {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-bottom: 10px;
    }

    .presetBtn {
      font-size: 13px;
      padding: 6px 16px;
      min-width: 0;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.15);
      background: #222;
      color: rgba(255,255,255,0.55);
    }

    .presetBtn:hover { background: #2e2e2e; color: rgba(255,255,255,0.85); }
    .presetBtn.active { border-color: var(--accent); color: var(--accent); }

    /* ====== CONTROLS ====== */
    .controls {
      display: flex;
      gap: 12px;
      justify-content: center;
      align-items: center;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    button {
      font-size: 18px;
      padding: 12px 18px;
      border: 0;
      border-radius: 12px;
      cursor: pointer;
      background: #2b2b2b;
      color: #fff;
      transition: transform 0.05s ease, background 0.2s ease;
      min-width: 120px;
    }

    button:hover { background: #3a3a3a; }
    button:active { transform: scale(0.98); }

    .resetBtn { background: #3a1f1f; }
    .resetBtn:hover { background: #4a2a2a; }

    .statusRow{
      margin-top: 12px;
      display: flex;
      justify-content: center;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap;
    }

    .status {
      font-size: 14px;
      color: #9aa0a6;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      opacity: 0.95;
    }

    .elapsed {
      font-size: 13px;
      color: rgba(255,255,255,0.35);
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.03em;
    }

    .runningDot {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #f44336; /* red when stopped */
      transition: background 220ms ease;
    }

    .running .runningDot { background: #4caf50; }

    .toggles{
      display: inline-flex;
      gap: 12px;
      align-items: center;
      color: rgba(255,255,255,0.75);
      font-size: 14px;
      user-select: none;
    }

    .toggles label{
      display: inline-flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }

    input[type="checkbox"]{
      width: 18px;
      height: 18px;
      accent-color: var(--accent);
      cursor: pointer;
    }

    /* ====== SESSION GOAL ====== */
    .goalRow {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 14px;
      font-size: 14px;
      color: rgba(255,255,255,0.7);
      user-select: none;
    }

    .goalRow label { display: flex; align-items: center; gap: 6px; }

    .goalRow input[type="number"] {
      width: 52px;
      padding: 4px 6px;
      background: #2b2b2b;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      text-align: center;
    }

    .sessionBar {
      margin-top: 10px;
      height: 6px;
      border-radius: 3px;
      background: rgba(255,255,255,0.1);
      overflow: hidden;
    }

    .sessionBarFill {
      height: 100%;
      border-radius: 3px;
      background: var(--accent);
      transition: width 400ms ease, background 220ms ease;
      width: 0%;
    }

    .doneOverlay {
      display: none;
      position: absolute;
      inset: 0;
      border-radius: 16px;
      background: rgba(0,0,0,0.78);
      place-items: center;
    }

    .doneOverlay.visible { display: grid; }

    /* ====== COUNTDOWN ====== */
    .countdownOverlay {
      display: none;
      position: absolute;
      inset: 0;
      border-radius: 16px;
      background: rgba(0,0,0,0.72);
      place-items: center;
      z-index: 20;
    }

    .countdownOverlay.visible { display: grid; }

    @keyframes countdownPop {
      0%   { transform: scale(1.5); opacity: 0; }
      25%  { transform: scale(1);   opacity: 1; }
      75%  { transform: scale(1);   opacity: 1; }
      100% { transform: scale(0.8); opacity: 0; }
    }

    .countdownNum {
      font-size: 100px;
      font-weight: 800;
      color: var(--accent);
      line-height: 1;
    }

    .countdownNum.pop { animation: countdownPop 900ms ease forwards; }

    .doneContent {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .doneTitle {
      font-size: 28px;
      font-weight: 700;
      color: #34d399;
      letter-spacing: 0.03em;
    }

    .doneTime {
      font-size: 15px;
      color: rgba(255,255,255,0.6);
    }

    .doneRestartBtn {
      margin-top: 6px;
      font-size: 16px;
      padding: 10px 28px;
      min-width: 0;
      background: #34d399;
      color: #000;
      font-weight: 600;
      border-radius: 12px;
    }

    .doneRestartBtn:hover { background: #6ee7b7; }

    .hint {
      margin-top: 8px;
      font-size: 12px;
      color: rgba(255,255,255,0.45);
      line-height: 1.35;
    }

    /* ====== CUSTOM DURATIONS ====== */
    .durations {
      display: flex;
      gap: 6px;
      justify-content: center;
      flex-wrap: wrap;
      margin: 6px 0 2px;
    }

    .durItem {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }

    .durName {
      font-size: 10px;
      color: rgba(255,255,255,0.38);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .durInput {
      width: 42px;
      padding: 4px 2px;
      background: #1e1e1e;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px;
      color: rgba(255,255,255,0.7);
      font-size: 14px;
      text-align: center;
    }

    .durInput:focus { outline: none; border-color: var(--accent); }
    .durInput:disabled { opacity: 0.35; }

    .durUnit {
      font-size: 9px;
      color: rgba(255,255,255,0.25);
    }

    /* ====== PHASE HINT ====== */
    .phaseHint {
      font-size: 14px;
      color: rgba(255,255,255,0.45);
      font-style: italic;
      min-height: 20px;
      margin-top: -4px;
      margin-bottom: 2px;
      transition: opacity 300ms ease;
    }

    /* ====== NEXT PHASE ====== */
    .nextPhase {
      font-size: 12px;
      color: rgba(255,255,255,0.32);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      min-height: 16px;
      margin-top: 0;
      margin-bottom: 4px;
    }

    /* ====== SESSION HISTORY ====== */
    .history {
      margin-top: 16px;
      border-top: 1px solid rgba(255,255,255,0.08);
      padding-top: 10px;
      text-align: left;
    }

    .history summary {
      cursor: pointer;
      user-select: none;
      color: rgba(255,255,255,0.35);
      font-size: 11px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      list-style: none;
      display: flex;
      align-items: center;
      gap: 5px;
      outline: none;
    }

    .history summary::before { content: "▸"; transition: transform 0.2s; }
    .history[open] summary::before { transform: rotate(90deg); }

    .historyItem {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 5px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      font-size: 13px;
    }

    .histDate  { color: rgba(255,255,255,0.4); }
    .histStats { color: rgba(255,255,255,0.6); font-variant-numeric: tabular-nums; }
    .historyEmpty { color: rgba(255,255,255,0.28); padding: 8px 0; font-style: italic; font-size: 13px; }

    /* ====== FULLSCREEN ====== */
    .fullscreenBtn {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 34px;
      height: 34px;
      min-width: 0;
      padding: 0;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      color: rgba(255,255,255,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .fullscreenBtn:hover {
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.8);
      border-color: rgba(255,255,255,0.25);
    }
  </style>
</head>

<body>
  <div class="container" id="app">
    <button class="fullscreenBtn" id="fullscreenBtn" title="Toggle fullscreen" aria-label="Toggle fullscreen">
      <svg id="fsEnterIcon" viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="1,6 1,1 6,1"/><polyline points="10,1 15,1 15,6"/>
        <polyline points="15,10 15,15 10,15"/><polyline points="6,15 1,15 1,10"/>
      </svg>
      <svg id="fsExitIcon" viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="display:none">
        <polyline points="6,1 6,6 1,6"/><polyline points="10,1 10,6 15,6"/>
        <polyline points="15,10 10,10 10,15"/><polyline points="1,10 6,10 6,15"/>
      </svg>
    </button>

    <div class="doneOverlay" id="doneOverlay">
      <div class="doneContent">
        <div class="doneTitle">Session complete</div>
        <div class="doneTime" id="doneTime"></div>
        <button class="doneRestartBtn" id="doneRestartBtn">Start again</button>
      </div>
    </div>

    <div class="countdownOverlay" id="countdownOverlay">
      <div class="countdownNum" id="countdownNum">3</div>
    </div>
    <div class="cycle" id="cycle">Cycle: 1</div>
    <div class="phase" id="phase">Pause</div>

    <div class="ringWrap">
      <svg class="ringSvg" viewBox="0 0 220 220" aria-hidden="true">
        <circle class="ringBg" cx="110" cy="110" r="92" fill="transparent" stroke-width="14" />
        <circle id="ringProgress" class="ringProgress" cx="110" cy="110" r="92" fill="transparent" stroke-width="14" />
      </svg>

      <div class="ringContent">
        <div id="breathCircle" class="breathCircle"></div>
        <div>
          <div class="time" id="time">2</div>
          <div class="subHint" id="secondsLabel">seconds</div>
        </div>
      </div>
    </div>

    <div class="phaseHint" id="phaseHint"></div>
    <div class="nextPhase" id="nextPhase"></div>

    <div class="presets" id="presets">
      <button class="presetBtn active" data-preset="relax">Relax</button>
      <button class="presetBtn" data-preset="box">Box</button>
      <button class="presetBtn" data-preset="478">4-7-8</button>
    </div>

    <div class="durations" id="durations"></div>

    <div class="controls">
      <button id="toggleBtn">Start</button>
      <button id="resetBtn" class="resetBtn">Reset</button>
    </div>

    <div class="statusRow">
      <div class="status">
        <span class="runningDot"></span>
        <span id="statusText">Stopped</span>
        <span id="elapsed" class="elapsed">0:00</span>
      </div>

      <div class="toggles">
        <label><input type="checkbox" id="soundToggle" checked> Sound</label>
        <label><input type="checkbox" id="vibeToggle" checked> Vibration</label>
      </div>
    </div>

    <div class="goalRow">
      <label>
        Goal:
        <input type="number" id="goalInput" min="1" max="99" value="5" />
        cycles
      </label>
    </div>

    <div class="sessionBar">
      <div class="sessionBarFill" id="sessionBarFill"></div>
    </div>

    <details class="history" id="historyDetails">
      <summary>Past sessions</summary>
      <div id="historyList"></div>
    </details>

    <div class="hint" id="hint">
      If sound doesn’t play: press Start (browsers require a user gesture).<br/>
      Vibration works only on supported devices (often Android/Chrome) and usually over HTTPS.
    </div>
  </div>

  <script>
    /******************************************************************
     *  CONFIG (constants)
     ******************************************************************/
    // UI text
    const UI = Object.freeze({
      cyclePrefix: "Cycle:",
      secondsLabel: "seconds",
      statusRunning: "Running",
      statusStopped: "Stopped",
      btnStart: "Start",
      btnStop: "Stop",
      hintHtml:
        "Sound: tap Start to activate (required by all browsers).<br/>" +
        "Vibration: Android/Chrome only — not available on iOS or desktop.<br/>" +
        "Keys: Space — start/stop &nbsp;·&nbsp; R — reset &nbsp;·&nbsp; F — fullscreen"
    });

    // Phase sequence: 2s Pause -> 4s Inhale -> 2s Pause -> 8s Exhale
    // Add/adjust durations, colors, and cue frequencies here.
    // breathR: [startFraction, endFraction] — 0=contracted, 1=expanded
    const PRESETS = {
      relax: [
        { name: "Hold",   durationSec: 2, breathR: [0, 0], theme: { bg: "#101010", accent: "#9aa0a6" }, cue: { freqHz: 440 }, hint: "settle your body and mind" },
        { name: "Inhale", durationSec: 4, breathR: [0, 1], theme: { bg: "#07160a", accent: "#34d399" }, cue: { freqHz: 660 }, hint: "breathe in slowly through your nose" },
        { name: "Hold",   durationSec: 2, breathR: [1, 1], theme: { bg: "#0d0a1a", accent: "#a78bfa" }, cue: { freqHz: 520 }, hint: "hold gently, stay relaxed" },
        { name: "Exhale", durationSec: 7, breathR: [1, 0], theme: { bg: "#06121d", accent: "#60a5fa" }, cue: { freqHz: 330 }, hint: "breathe out slowly through your mouth" },
      ],
      box: [
        { name: "Inhale", durationSec: 4, breathR: [0, 1], theme: { bg: "#07160a", accent: "#34d399" }, cue: { freqHz: 660 }, hint: "breathe in slowly through your nose" },
        { name: "Hold",   durationSec: 4, breathR: [1, 1], theme: { bg: "#0d0a1a", accent: "#a78bfa" }, cue: { freqHz: 520 }, hint: "hold gently, stay relaxed" },
        { name: "Exhale", durationSec: 4, breathR: [1, 0], theme: { bg: "#06121d", accent: "#60a5fa" }, cue: { freqHz: 330 }, hint: "breathe out slowly and fully" },
        { name: "Hold",   durationSec: 4, breathR: [0, 0], theme: { bg: "#101010", accent: "#9aa0a6" }, cue: { freqHz: 440 }, hint: "rest quietly, keep still" },
      ],
      "478": [
        { name: "Inhale", durationSec: 4, breathR: [0, 1], theme: { bg: "#07160a", accent: "#34d399" }, cue: { freqHz: 660 }, hint: "breathe in through your nose" },
        { name: "Hold",   durationSec: 7, breathR: [1, 1], theme: { bg: "#0d0a1a", accent: "#a78bfa" }, cue: { freqHz: 520 }, hint: "hold gently, don't strain" },
        { name: "Exhale", durationSec: 8, breathR: [1, 0], theme: { bg: "#06121d", accent: "#60a5fa" }, cue: { freqHz: 330 }, hint: "exhale fully through your mouth" },
      ],
    };

    let activePhases = PRESETS.relax.map(p => ({...p}));

    // Sound settings
    const SOUND = Object.freeze({
      enabledByDefault: true,
      waveform: "sine",   // "sine" | "square" | "triangle" | "sawtooth"
      volume: 0.12,       // 0..1
      beepMs: 120,        // duration of beep
      attackSec: 0.01,    // quick fade-in
      releasePadSec: 0.02 // small padding to avoid clicks
    });

    // Vibration settings
    const VIBRATION = Object.freeze({
      enabledByDefault: true,
      pattern: [55, 40, 55] // ms pattern
    });

    // Progress ring settings (must match SVG attributes where relevant)
    const RING = Object.freeze({
      radius: 92,
      strokeWidth: 14
    });

    // Countdown behaviour
    const COUNTDOWN = Object.freeze({
      minShownSeconds: 1 // show 4..1 (never show 0)
    });

    // Session goal
    const SESSION = Object.freeze({
      defaultCycles: 5
    });

    // localStorage keys
    const STORAGE_KEY  = "mb_v1";
    const HISTORY_KEY  = "mb_history";

    /******************************************************************
     *  STATE
     ******************************************************************/
    let currentPhaseIndex = 0;
    let cycleCount = 1;

    // Smooth phase time (ms)
    let elapsedMs = 0;        // elapsed within current phase (kept on pause)
    let phaseStartTs = null;  // performance.now() - elapsedMs

    // requestAnimationFrame
    let rafId = null;
    let isRunning = false;

    // Audio (created on first Start click)
    let audioCtx = null;

    // Wake lock
    let wakeLockSentinel = null;

    // Session elapsed time tracking
    let sessionResumeTs = 0;
    let totalSessionMs = 0;

    // Persistence
    let activePresetKey = "relax";
    let savedDurations = {};

    // Countdown
    let isCountingDown = false;
    let countdownTimers = [];

    /******************************************************************
     *  DOM
     ******************************************************************/
    const appEl = document.getElementById("app");
    const phaseEl = document.getElementById("phase");
    const timeEl = document.getElementById("time");
    const cycleEl = document.getElementById("cycle");
    const toggleBtn = document.getElementById("toggleBtn");
    const resetBtn = document.getElementById("resetBtn");
    const statusText = document.getElementById("statusText");
    const ringProgressEl = document.getElementById("ringProgress");
    const secondsLabelEl = document.getElementById("secondsLabel");
    const hintEl = document.getElementById("hint");

    const soundToggle = document.getElementById("soundToggle");
    const vibeToggle = document.getElementById("vibeToggle");
    const presetsEl = document.getElementById("presets");
    const durationsEl = document.getElementById("durations");
    const goalInput = document.getElementById("goalInput");
    const sessionBarFill = document.getElementById("sessionBarFill");
    const doneOverlay = document.getElementById("doneOverlay");
    const breathCircleEl = document.getElementById("breathCircle");
    const elapsedEl = document.getElementById("elapsed");
    const nextPhaseEl = document.getElementById("nextPhase");
    const phaseHintEl = document.getElementById("phaseHint");

    // Apply default toggle states + UI text
    soundToggle.checked = SOUND.enabledByDefault;
    vibeToggle.checked = VIBRATION.enabledByDefault;
    secondsLabelEl.textContent = UI.secondsLabel;
    hintEl.innerHTML = UI.hintHtml;
    goalInput.value = SESSION.defaultCycles;

    /******************************************************************
     *  RING GEOMETRY
     ******************************************************************/
    const CIRC = 2 * Math.PI * RING.radius;
    ringProgressEl.style.strokeDasharray = String(CIRC);
    ringProgressEl.style.strokeDashoffset = String(CIRC); // empty at start

    /******************************************************************
     *  HELPERS
     ******************************************************************/
    function hexToRgba(hex, alpha) {
      const h = hex.replace("#", "");
      const full = h.length === 3 ? h.split("").map(c => c + c).join("") : h;
      const r = parseInt(full.slice(0, 2), 16);
      const g = parseInt(full.slice(2, 4), 16);
      const b = parseInt(full.slice(4, 6), 16);
      return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

    function getPhase() {
      return activePhases[currentPhaseIndex];
    }

    function getGoal() {
      const v = parseInt(goalInput.value, 10);
      return Number.isFinite(v) && v >= 1 ? v : SESSION.defaultCycles;
    }

    function applyThemeForCurrentPhase() {
      const { bg, accent } = getPhase().theme;
      document.body.style.setProperty("--bg", bg);
      document.documentElement.style.setProperty("--accent", accent);
      document.documentElement.style.setProperty("--accentSoft", hexToRgba(accent, 0.22));
      appEl.style.borderColor = hexToRgba(accent, 0.22);
    }

    /******************************************************************
     *  DURATION INPUTS
     ******************************************************************/
    function buildDurationInputs() {
      durationsEl.innerHTML = "";
      activePhases.forEach((phase, i) => {
        const item = document.createElement("label");
        item.className = "durItem";

        const name = document.createElement("span");
        name.className = "durName";
        name.textContent = phase.name;

        const input = document.createElement("input");
        input.type = "number";
        input.className = "durInput";
        input.min = 1;
        input.max = 99;
        input.value = phase.durationSec;
        input.dataset.index = i;
        input.disabled = isRunning;

        const unit = document.createElement("span");
        unit.className = "durUnit";
        unit.textContent = "sec";

        item.append(name, input, unit);
        durationsEl.appendChild(item);
      });
    }

    durationsEl.addEventListener("change", e => {
      const input = e.target.closest(".durInput");
      if (!input || isRunning) return;
      const idx = parseInt(input.dataset.index, 10);
      const val = parseInt(input.value, 10);
      if (Number.isFinite(val) && val >= 1) {
        activePhases[idx] = { ...activePhases[idx], durationSec: val };
        reset();
        saveSettings();
      }
    });

    /******************************************************************
     *  PERSISTENCE
     ******************************************************************/
    function saveSettings() {
      try {
        savedDurations[activePresetKey] = activePhases.map(p => p.durationSec);
        localStorage.setItem(STORAGE_KEY, JSON.stringify({
          sound: soundToggle.checked,
          vibe: vibeToggle.checked,
          preset: activePresetKey,
          goal: goalInput.value,
          durations: savedDurations,
        }));
      } catch (_) {}
    }

    function loadSettings() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return;
        const data = JSON.parse(raw);
        if (typeof data.sound === "boolean") soundToggle.checked = data.sound;
        if (typeof data.vibe === "boolean") vibeToggle.checked = data.vibe;
        if (data.goal) goalInput.value = data.goal;
        if (data.durations && typeof data.durations === "object") savedDurations = data.durations;
        if (data.preset && data.preset in PRESETS) {
          activePresetKey = data.preset;
          activePhases = PRESETS[activePresetKey].map(p => ({...p}));
          const saved = savedDurations[activePresetKey];
          if (Array.isArray(saved)) {
            saved.forEach((sec, i) => {
              if (i < activePhases.length && Number.isFinite(sec) && sec >= 1) {
                activePhases[i] = { ...activePhases[i], durationSec: sec };
              }
            });
          }
          presetsEl.querySelectorAll(".presetBtn").forEach(b =>
            b.classList.toggle("active", b.dataset.preset === activePresetKey)
          );
        }
      } catch (_) {}
    }

    /******************************************************************
     *  SESSION HISTORY
     ******************************************************************/
    function saveHistory(entry) {
      try {
        const raw = localStorage.getItem(HISTORY_KEY);
        const list = raw ? JSON.parse(raw) : [];
        list.unshift(entry);
        if (list.length > 5) list.length = 5;
        localStorage.setItem(HISTORY_KEY, JSON.stringify(list));
      } catch (_) {}
    }

    function renderHistory() {
      const el = document.getElementById("historyList");
      try {
        const raw = localStorage.getItem(HISTORY_KEY);
        const list = raw ? JSON.parse(raw) : [];
        if (!list.length) {
          el.innerHTML = '<div class="historyEmpty">No sessions yet</div>';
          return;
        }
        const today = new Date();
        const yesterday = new Date(today); yesterday.setDate(today.getDate() - 1);
        el.innerHTML = list.map(s => {
          const d = new Date(s.date);
          const dateLabel = d.toDateString() === today.toDateString()     ? "Today"
                          : d.toDateString() === yesterday.toDateString() ? "Yesterday"
                          : d.toLocaleDateString(undefined, { weekday: "short", month: "short", day: "numeric" });
          const timeLabel = d.toLocaleTimeString(undefined, { hour: "2-digit", minute: "2-digit" });
          return `<div class="historyItem">
            <span class="histDate">${dateLabel} ${timeLabel}</span>
            <span class="histStats">${s.cycles} cycle${s.cycles !== 1 ? "s" : ""} · ${formatDuration(s.durationMs)}</span>
          </div>`;
        }).join("");
      } catch (_) {
        el.innerHTML = "";
      }
    }

    /******************************************************************
     *  WAKE LOCK
     ******************************************************************/
    async function acquireWakeLock() {
      if (!("wakeLock" in navigator)) return;
      try {
        wakeLockSentinel = await navigator.wakeLock.request("screen");
        wakeLockSentinel.addEventListener("release", () => { wakeLockSentinel = null; });
      } catch (_) {}
    }

    function releaseWakeLock() {
      if (wakeLockSentinel) {
        wakeLockSentinel.release().catch(() => {});
        wakeLockSentinel = null;
      }
    }

    // Re-acquire after tab becomes visible again (browser releases it on hide)
    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "visible" && isRunning) acquireWakeLock();
    });

    /******************************************************************
     *  SOUND / VIBRATION
     ******************************************************************/

    function playBeep(freqHz, ms = SOUND.beepMs, volume = SOUND.volume) {
      if (!soundToggle.checked) return;
      if (!audioCtx) return;

      const t0 = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();

      osc.type = SOUND.waveform;
      osc.frequency.setValueAtTime(freqHz, t0);

      // Envelope: quick attack + exponential decay (reduces clicks)
      gain.gain.setValueAtTime(0.0001, t0);
      gain.gain.exponentialRampToValueAtTime(volume, t0 + SOUND.attackSec);
      gain.gain.exponentialRampToValueAtTime(0.0001, t0 + ms / 1000);

      osc.connect(gain);
      gain.connect(audioCtx.destination);

      osc.start(t0);
      osc.stop(t0 + ms / 1000 + SOUND.releasePadSec);
    }

    function vibrate(pattern = VIBRATION.pattern) {
      if (!vibeToggle.checked) return;
      if (!("vibrate" in navigator)) return;
      try { navigator.vibrate(pattern); } catch (_) {}
    }

    function playCompletionChime() {
      if (!soundToggle.checked || !audioCtx) return;
      const notes = [880, 698, 523];
      const dur = 0.45;
      notes.forEach((freq, i) => {
        const t0 = audioCtx.currentTime + i * 0.38;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = "sine";
        osc.frequency.setValueAtTime(freq, t0);
        gain.gain.setValueAtTime(0.0001, t0);
        gain.gain.exponentialRampToValueAtTime(0.09, t0 + 0.015);
        gain.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(t0);
        osc.stop(t0 + dur + 0.05);
      });
    }

    function cueOnPhaseEnter(phaseIndex) {
      const phase = activePhases[phaseIndex];
      const freqHz = phase?.cue?.freqHz ?? 520;
      playBeep(freqHz);
      vibrate();
    }

    /******************************************************************
     *  RENDER
     ******************************************************************/
    function renderSessionBar() {
      const goal = getGoal();
      const pct = Math.min(100, ((cycleCount - 1) / goal) * 100);
      sessionBarFill.style.width = `${pct}%`;
    }

    function render(progress01, secondsLeftInt) {
      const offset = CIRC * (1 - progress01);
      ringProgressEl.style.strokeDashoffset = String(offset);

      const goal = getGoal();
      cycleEl.textContent = `${UI.cyclePrefix} ${cycleCount} / ${goal}`;

      const nextPhaseName = getPhase().name;
      if (phaseEl.textContent !== nextPhaseName) {
        phaseEl.textContent = nextPhaseName;
        phaseEl.classList.remove("phaseChange");
        void phaseEl.offsetWidth;
        phaseEl.classList.add("phaseChange");
      }

      // Update countdown only when it changes
      const nextText = String(secondsLeftInt);
      if (timeEl.textContent !== nextText) {
        timeEl.textContent = nextText;
      }

      applyThemeForCurrentPhase();

      const [bFrom, bTo] = getPhase().breathR;
      const bT = bFrom + progress01 * (bTo - bFrom);
      const bPx = Math.round(24 + bT * 146);
      breathCircleEl.style.width = `${bPx}px`;
      breathCircleEl.style.height = `${bPx}px`;

      const brightnessPct = 100 + Math.round(bT * 14);
      document.body.style.filter = `brightness(${brightnessPct}%)`;

      renderSessionBar();

      const nextElapsed = getElapsedDisplay();
      if (elapsedEl.textContent !== nextElapsed) elapsedEl.textContent = nextElapsed;

      const nextIdx = (currentPhaseIndex + 1) % activePhases.length;
      const nextLabel = isRunning ? `Next: ${activePhases[nextIdx].name}` : "";
      if (nextPhaseEl.textContent !== nextLabel) nextPhaseEl.textContent = nextLabel;

      const hintText = isRunning ? (getPhase().hint || "") : "";
      if (phaseHintEl.textContent !== hintText) phaseHintEl.textContent = hintText;
    }

    /******************************************************************
     *  PHASE ADVANCE
     ******************************************************************/
    function nextPhaseIndex() {
      return (currentPhaseIndex + 1) % activePhases.length;
    }

    function advanceToNextPhase(nowTs) {
      const isLastPhase = currentPhaseIndex === activePhases.length - 1;
      const nextIdx = nextPhaseIndex();

      if (isLastPhase) {
        cycleCount++;
        if (cycleCount > getGoal()) {
          finishSession();
          return;
        }
      }

      currentPhaseIndex = nextIdx;
      elapsedMs = 0;
      phaseStartTs = nowTs;

      cueOnPhaseEnter(currentPhaseIndex);
    }

    function finishSession() {
      playCompletionChime();
      stop();
      saveHistory({ date: new Date().toISOString(), durationMs: totalSessionMs, cycles: getGoal() });
      renderHistory();
      renderSessionBar();
      document.getElementById("doneTime").textContent = `Total time: ${formatDuration(totalSessionMs)}`;
      doneOverlay.classList.add("visible");
    }

    /******************************************************************
     *  MAIN LOOP (smooth animation)
     ******************************************************************/
    function loop(nowTs) {
      if (!isRunning) return;

      const durationMs = getPhase().durationSec * 1000;

      if (phaseStartTs == null) {
        phaseStartTs = nowTs - elapsedMs;
      }

      elapsedMs = nowTs - phaseStartTs;

      const progress = elapsedMs / durationMs;

      if (progress >= 1) {
        // Close ring for the last frame of this phase
        render(1, COUNTDOWN.minShownSeconds);

        // Switch phase
        advanceToNextPhase(nowTs);

        // Show start of new phase immediately
        render(0, getPhase().durationSec);

        rafId = requestAnimationFrame(loop);
        return;
      }

      // Countdown: show 4..1 (no 0)
      const secondsLeft = Math.max(
        COUNTDOWN.minShownSeconds,
        Math.ceil((durationMs - elapsedMs) / 1000)
      );

      render(progress, secondsLeft);
      rafId = requestAnimationFrame(loop);
    }

    /******************************************************************
     *  CONTROLS
     ******************************************************************/
    const countdownOverlay = document.getElementById("countdownOverlay");
    const countdownNumEl   = document.getElementById("countdownNum");

    function showCountdown(callback) {
      isCountingDown = true;
      countdownOverlay.classList.add("visible");
      toggleBtn.textContent = UI.btnStop;

      [3, 2, 1].forEach((n, i) => {
        const t = setTimeout(() => {
          if (vibeToggle.checked && "vibrate" in navigator) {
            try { navigator.vibrate(40); } catch (_) {}
          }
          countdownNumEl.textContent = n;
          countdownNumEl.classList.remove("pop");
          void countdownNumEl.offsetWidth;
          countdownNumEl.classList.add("pop");
        }, i * 1000);
        countdownTimers.push(t);
      });

      const finalT = setTimeout(() => {
        countdownOverlay.classList.remove("visible");
        isCountingDown = false;
        countdownTimers = [];
        callback();
      }, 3000);
      countdownTimers.push(finalT);
    }

    function cancelCountdown() {
      countdownTimers.forEach(clearTimeout);
      countdownTimers = [];
      countdownOverlay.classList.remove("visible");
      isCountingDown = false;
      updateStatusUI();
    }

    function updateStatusUI() {
      if (isRunning) {
        toggleBtn.textContent = UI.btnStop;
        statusText.textContent = UI.statusRunning;
        appEl.classList.add("running");
      } else {
        toggleBtn.textContent = UI.btnStart;
        statusText.textContent = UI.statusStopped;
        appEl.classList.remove("running");
      }
      durationsEl.querySelectorAll(".durInput").forEach(inp => { inp.disabled = isRunning; });
    }

    function formatDuration(ms) {
      const s = Math.round(ms / 1000);
      const m = Math.floor(s / 60);
      return m > 0 ? `${m} min ${s % 60} sec` : `${s} sec`;
    }

    function getElapsedDisplay() {
      const ms = isRunning ? totalSessionMs + (Date.now() - sessionResumeTs) : totalSessionMs;
      const s = Math.floor(ms / 1000);
      return `${Math.floor(s / 60)}:${String(s % 60).padStart(2, "0")}`;
    }

    function start() {
      if (isRunning) return;
      isRunning = true;
      sessionResumeTs = Date.now();

      breathCircleEl.classList.remove("idle");

      const now = performance.now();
      phaseStartTs = now - elapsedMs;

      cueOnPhaseEnter(currentPhaseIndex);
      updateStatusUI();
      rafId = requestAnimationFrame(loop);
    }

    function stop() {
      if (!isRunning) return;
      isRunning = false;

      if (rafId) cancelAnimationFrame(rafId);
      rafId = null;

      totalSessionMs += Date.now() - sessionResumeTs;
      elapsedEl.textContent = getElapsedDisplay();
      releaseWakeLock();
      goalInput.disabled = false;
      breathCircleEl.style.width = "";
      breathCircleEl.style.height = "";
      breathCircleEl.classList.add("idle");
      document.body.style.filter = "";
      updateStatusUI();
    }

    function reset() {
      if (isCountingDown) cancelCountdown();
      stop();
      currentPhaseIndex = 0;
      cycleCount = 1;
      elapsedMs = 0;
      phaseStartTs = null;
      totalSessionMs = 0;
      sessionResumeTs = 0;
      doneOverlay.classList.remove("visible");
      goalInput.disabled = false;

      render(0, getPhase().durationSec);
    }

    presetsEl.addEventListener("click", e => {
      if (isRunning) return;
      const btn = e.target.closest(".presetBtn");
      if (!btn) return;
      const key = btn.dataset.preset;
      if (!(key in PRESETS)) return;
      savedDurations[activePresetKey] = activePhases.map(p => p.durationSec);
      activePresetKey = key;
      activePhases = PRESETS[key].map(p => ({...p}));
      const savedD = savedDurations[key];
      if (Array.isArray(savedD)) {
        savedD.forEach((sec, i) => {
          if (i < activePhases.length && Number.isFinite(sec) && sec >= 1) {
            activePhases[i] = { ...activePhases[i], durationSec: sec };
          }
        });
      }
      presetsEl.querySelectorAll(".presetBtn").forEach(b =>
        b.classList.toggle("active", b.dataset.preset === key)
      );
      buildDurationInputs();
      reset();
      saveSettings();
    });

    toggleBtn.addEventListener("click", async () => {
      if (isCountingDown) { cancelCountdown(); return; }
      if (isRunning) { stop(); return; }

      // Create/resume AudioContext synchronously within user gesture
      if (soundToggle.checked) {
        if (!audioCtx) {
          const AC = window.AudioContext || window.webkitAudioContext;
          if (AC) audioCtx = new AC();
        }
        if (audioCtx && audioCtx.state === "suspended") {
          try { await audioCtx.resume(); } catch (_) {}
        }
      }

      // Prime vibration API while still inside user gesture
      if ("vibrate" in navigator) {
        try { navigator.vibrate(0); } catch (_) {}
      }

      goalInput.disabled = true;
      showCountdown(() => {
        start();
        acquireWakeLock();
      });
    });

    resetBtn.addEventListener("click", reset);
    document.getElementById("doneRestartBtn").addEventListener("click", reset);

    soundToggle.addEventListener("change", saveSettings);
    vibeToggle.addEventListener("change", saveSettings);
    goalInput.addEventListener("change", saveSettings);

    /******************************************************************
     *  FULLSCREEN
     ******************************************************************/
    const fullscreenBtn = document.getElementById("fullscreenBtn");

    function isFullscreen() {
      return !!(document.fullscreenElement || document.webkitFullscreenElement);
    }

    function updateFullscreenIcon() {
      document.getElementById("fsEnterIcon").style.display = isFullscreen() ? "none" : "";
      document.getElementById("fsExitIcon").style.display = isFullscreen() ? "" : "none";
    }

    fullscreenBtn.addEventListener("click", () => {
      if (!isFullscreen()) {
        const el = document.documentElement;
        (el.requestFullscreen || el.webkitRequestFullscreen).call(el).catch(() => {});
      } else {
        (document.exitFullscreen || document.webkitExitFullscreen).call(document).catch(() => {});
      }
    });

    document.addEventListener("fullscreenchange", updateFullscreenIcon);
    document.addEventListener("webkitfullscreenchange", updateFullscreenIcon);

    /******************************************************************
     *  KEYBOARD SHORTCUTS
     ******************************************************************/
    document.addEventListener("keydown", e => {
      if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;
      if (e.metaKey || e.ctrlKey || e.altKey) return;
      switch (e.code) {
        case "Space": e.preventDefault(); toggleBtn.click(); break;
        case "KeyR":  resetBtn.click();    break;
        case "KeyF":  fullscreenBtn.click(); break;
      }
    });

    // ====== Init (no cue on load) ======
    loadSettings();
    buildDurationInputs();
    renderHistory();
    render(0, getPhase().durationSec);
    updateStatusUI();
    breathCircleEl.classList.add("idle");
  </script>
</body>
</html>
